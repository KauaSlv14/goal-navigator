<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="100" height="100" fill="url(#grad)" rx="20"/>
  
  <!-- Staircase/steps icon -->
  <g transform="translate(25, 25) scale(1.5)">
    <!-- Step 1 (bottom-left) -->
    <rect x="0" y="36" width="12" height="12" fill="white" opacity="0.9"/>
    <!-- Step 2 (middle) -->
    <rect x="16" y="20" width="12" height="12" fill="white"/>
    <!-- Step 3 (top-right) -->
    <rect x="32" y="4" width="12" height="12" fill="white" opacity="0.95"/>
    <!-- Connector line -->
    <line x1="6" y1="36" x2="38" y2="4" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
